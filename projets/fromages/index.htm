<html>
<head>
    <meta charset="utf-8">
    <title>Configurateur de plateau de fromage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Partie formulaire -->
    <div id="formulaire-fromage">
        <h1 access="false" id="config-title">Configurer votre événement</h1>
          
        <div class="form-radio" id="event-types">
            <legend class="form-label">Type d'événement</label>
            <div class="event-type-option">
                <input name="event-type" access="false" id="event-type-0" required="required" aria-required="true" value="repas" type="radio" onclick="selected_event_type('repas')">
                <label for="event-type-0">Vin et fromages</label>
            </div>
            <div class="event-type-option">
                <input name="event-type" access="false" id="event-type-1" required="required" aria-required="true" value="apero" type="radio" onclick="selected_event_type('apero')">
                <label for="event-type-1">Apéro</label>
            </div>
            <div class="event-type-option">
                <input name="event-type" access="false" id="event-type-2" required="required" aria-required="true" value="degustation" type="radio" onclick="selected_event_type('degustation')">
                <label for="event-type-2">Dégustation</label>
            </div>
        </div>

        <div class="form-number">
            <label for="number-personnes" class="form-label">Nombre de convives</label>
            <input type="range" class="slider" name="nb-personnes" id="nb-personnes" min="1" max="15" step="1" value="1" required="required" oninput="cheese_types_quantity(this.value)">
        </div>
        

        <div class="form-select" id="cheese-types" onchange="check_cheese_types_selection()">
            <legend class="form-label">Type de fromages souhaités</legend>
            
            <input type="checkbox" class="fromages-type-option" name="cheese-type" value="soft-ripened-cheese" id="cheese-type-0">
            <label for="cheese-type-0" class="fromages-type-option-label">Pâtes molles à croûte fleurie</label>

            <input type="checkbox" class="fromages-type-option" name="cheese-type" value="pressed-cheese" id="cheese-type-1">
            <label for="cheese-type-1" class="fromages-type-option-label">Pâtes pressées cuites</label>

            <input type="checkbox" class="fromages-type-option" name="cheese-type" value="uncooked-pressed-cheese" id="cheese-type-2">
            <label for="cheese-type-2" class="fromages-type-option-label">Pâtes pressées non-cuites</label>

            <input type="checkbox" class="fromages-type-option" name="cheese-type" value="rind-washed-cheese" id="cheese-type-3">
            <label for="cheese-type-3" class="fromages-type-option-label">Pâtes molles à croûte lavée</label>

            <input type="checkbox" class="fromages-type-option" name="cheese-type" value="blue-cheese" id="cheese-type-4">
            <label for="cheese-type-4" class="fromages-type-option-label">Pâtes persillées</label>

            <input type="checkbox" class="fromages-type-option" name="cheese-type" value="fresh-cheese" id="cheese-type-5">
            <label for="cheese-type-5" class="fromages-type-option-label">Fromage frais</label>

            <input type="checkbox" class="fromages-type-option" name="cheese-type" value="goat-cheese" id="cheese-type-6">
            <label for="cheese-type-6" class="fromages-type-option-label">Fromage de chèvre</label>

            <input type="checkbox" class="fromages-type-option" name="cheese-type" value="sheep-cheese" id="cheese-type-7">
            <label for="cheese-type-7" class="fromages-type-option-label">Fromage de brebis</label>
        </div>

        <button id="btn-generation-plateau">Générer un plateau de fromage!</button>
    </div>
    <!-- Partie proposition -->
    <div id="plateau-proposition">
        <h1>Votre plateau de fromage</h1>
        <h2>Votre événement:</h2>
        <div id="resume"></div>
            <p>Votre événement est un<span id="event-type-selected"></span></p>
            <p>Nombre de personnes prévues: <span id="nbPersonnes"></span></p>
            <p>Quandité de fromage à prévoir au total: <span id="qtyFromage"></span></p>
        <div id="fromages-proposes"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
